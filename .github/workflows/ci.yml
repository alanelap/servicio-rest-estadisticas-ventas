name: CI

on:
  push:
  pull_request:

permissions:
  # CI solo necesita leer el checkout; no publica paquetes ni modifica el repositorio.
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Format
        run: python -m ruff format --check .
      - name: Mypy
        run: python -m mypy app
      - name: Pytest and coverage
        # La suite usa tests/fixtures/ventas.csv y nunca descarga el dataset oficial.
        run: python -m pytest --cov=app --cov-report=term-missing
